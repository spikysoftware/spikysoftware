<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" role="img" aria-labelledby="title desc">
  <title id="title">Spiky Software logo placeholder</title>
  <desc id="desc">A sharp neon wordmark for Spiky Software.</desc>
  <defs>
    <linearGradient id="markGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4df0ff"/>
      <stop offset=".55" stop-color="#ff3d8b"/>
      <stop offset="1" stop-color="#ffe45c"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.35 0 0 0 0 0.93 0 0 0 0 1 0 0 0 .55 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="720" height="220" rx="28" fill="#07111f"/>
  <path d="M94 150 140 36l45 114-45-24-46 24Z" fill="url(#markGradient)" filter="url(#glow)"/>
  <path d="M114 126h52l-26-66-26 66Z" fill="#07111f" opacity=".82"/>
  <text x="220" y="103" fill="#f8fbff" font-family="Inter, Arial, sans-serif" font-size="56" font-weight="800" letter-spacing="0">Spiky</text>
  <text x="220" y="153" fill="#92a7bd" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="600" letter-spacing="0">Software</text>
  <path d="M585 68h54M585 108h80M585 148h42" stroke="#4df0ff" stroke-width="8" stroke-linecap="round" opacity=".85"/>
</svg>
